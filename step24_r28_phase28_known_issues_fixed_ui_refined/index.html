<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>山海學園｜入口導向中</title>
  <meta http-equiv="refresh" content="0; url=./login.html" />
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#94a3b8; --accent:#3b82f6; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:linear-gradient(180deg,#0b1220 0%, var(--bg) 100%); color:var(--text); font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; }
    .card { width:min(92vw,460px); background:var(--card); border:1px solid rgba(148,163,184,.18); border-radius:16px; padding:28px; box-shadow:0 24px 60px rgba(0,0,0,.45); text-align:center; }
    .badge { width:64px; height:64px; margin:0 auto 14px; display:grid; place-items:center; border-radius:18px; background:linear-gradient(135deg,rgba(59,130,246,.22),rgba(16,185,129,.16)); font-size:28px; }
    h1 { margin:0 0 8px; font-size:28px; }
    p { margin:0; color:var(--muted); }
    a { color:#93c5fd; }
  </style>
  <script>
    window.location.replace('./login.html');
  </script>
</head>
<body>
  <main class="card">
    <div class="badge">🧑‍🏫🐉</div>
    <h1>正在前往登入頁</h1>
    <p>若未自動跳轉，請點擊 <a href="./login.html">這裡</a>。</p>
  </main>
</body>
</html>
